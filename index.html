<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messaoud Assistant</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.3);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --user-bubble: #312e81;
      --ai-bubble: #1e293b;
      --danger: #ef4444;
      --success: #22c55e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .avatar {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    header h1 { font-size: 17px; font-weight: 600; }
    header .subtitle { font-size: 12px; color: var(--text-muted); }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      margin-left: auto;
      flex-shrink: 0;
    }
    .status-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      gap: 8px;
      max-width: 88%;
      animation: fadeUp .2s ease;
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai { align-self: flex-start; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .msg.user .msg-avatar { background: var(--user-bubble); }
    .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--accent), #8b5cf6); }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--accent);
      border-bottom-right-radius: 4px;
    }

    .msg.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .bubble code {
      background: rgba(0,0,0,.4);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 13px;
    }

    .bubble pre {
      background: rgba(0,0,0,.4);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      overflow-x: auto;
      margin: 6px 0;
    }

    .bubble pre code { background: none; padding: 0; }

    /* Typing indicator */
    .typing-indicator {
      display: flex; gap: 5px; padding: 12px 14px;
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }

    .typing-indicator span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce { 0%,60%,100%{transform:none} 30%{transform:translateY(-5px)} }

    /* Input area */
    #input-area {
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #prompt {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 42px;
      overflow-y: auto;
      line-height: 1.4;
      transition: border-color .2s;
    }

    #prompt:focus { border-color: var(--accent); }
    #prompt::placeholder { color: var(--text-muted); }

    .btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      transition: all .15s;
    }

    #send-btn {
      background: var(--accent);
      color: white;
    }

    #send-btn:hover { background: #4f46e5; transform: scale(1.05); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

    #mic-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    #mic-btn.recording {
      background: var(--danger);
      border-color: var(--danger);
      color: white;
      animation: pulse 1s infinite;
    }

    #mic-btn:hover:not(.recording) { border-color: var(--accent); color: var(--accent); }

    /* Empty state */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex: 1;
      text-align: center;
      padding: 40px 24px;
      color: var(--text-muted);
    }

    .empty-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      box-shadow: 0 0 32px var(--accent-glow);
    }

    #empty-state h2 { font-size: 20px; color: var(--text); }
    #empty-state p { font-size: 14px; max-width: 260px; line-height: 1.6; }

    .suggestions {
      display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 320px;
    }

    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      color: var(--text);
      transition: all .15s;
    }

    .suggestion:hover { border-color: var(--accent); background: rgba(99,102,241,.1); }

    /* Error toast */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%; transform: translateX(-50%);
      background: var(--danger);
      color: white;
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
      z-index: 100;
      max-width: 90%;
      text-align: center;
    }

    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <div class="avatar">🤖</div>
  <div>
    <h1>Messaoud</h1>
    <div class="subtitle">Assistant IA</div>
  </div>
  <div id="status-dot" class="status-dot"></div>
</header>

<div id="messages">
  <div id="empty-state">
    <div class="empty-icon">✨</div>
    <h2>Bonjour !</h2>
    <p>Je suis Messaoud, ton assistant IA. Comment puis-je t'aider ?</p>
    <div class="suggestions">
      <button class="suggestion" onclick="sendSuggestion(this)">💡 Explique-moi un concept technique</button>
      <button class="suggestion" onclick="sendSuggestion(this)">📝 Aide-moi à rédiger un message</button>
      <button class="suggestion" onclick="sendSuggestion(this)">🔍 Analyse ce problème avec moi</button>
    </div>
  </div>
</div>

<div id="input-area">
  <textarea id="prompt" placeholder="Écris ton message…" rows="1"></textarea>
  <button id="mic-btn" class="btn" title="Dicter">🎤</button>
  <button id="send-btn" class="btn" title="Envoyer">➤</button>
</div>

<div id="toast"></div>

<script>
  const API_ENDPOINT = '/api/chat';

  const messagesEl = document.getElementById('messages');
  const promptEl = document.getElementById('prompt');
  const sendBtn = document.getElementById('send-btn');
  const micBtn = document.getElementById('mic-btn');
  const statusDot = document.getElementById('status-dot');
  const emptyState = document.getElementById('empty-state');
  const toast = document.getElementById('toast');

  let history = [];
  let isLoading = false;
  let recognition = null;
  let isRecording = false;

  // Auto-resize textarea
  promptEl.addEventListener('input', () => {
    promptEl.style.height = 'auto';
    promptEl.style.height = Math.min(promptEl.scrollHeight, 120) + 'px';
  });

  // Send on Enter (Shift+Enter = newline)
  promptEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);

  function sendSuggestion(btn) {
    promptEl.value = btn.textContent.replace(/^[^\w]+/, '').trim();
    send();
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
  }

  function setLoading(val) {
    isLoading = val;
    sendBtn.disabled = val;
    statusDot.className = 'status-dot' + (val ? ' loading' : '');
  }

  function appendMessage(role, text) {
    if (emptyState.parentNode) emptyState.remove();

    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(text);

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function formatText(text) {
    // Simple markdown: code blocks, inline code, bold
    return text
      .replace(/```([\s\S]*?)```/g, (_, c) => `<pre><code>${escHtml(c.trim())}</code></pre>`)
      .replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showTyping() {
    if (emptyState.parentNode) emptyState.remove();
    const wrapper = document.createElement('div');
    wrapper.className = 'msg ai';
    wrapper.id = 'typing';
    wrapper.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>`;
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing')?.remove();
  }

  async function send() {
    const text = promptEl.value.trim();
    if (!text || isLoading) return;

    promptEl.value = '';
    promptEl.style.height = 'auto';
    setLoading(true);

    appendMessage('user', text);
    history.push({ role: 'user', content: text });

    showTyping();

    try {
      const res = await fetch(API_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const reply = data.content?.[0]?.text || data.reply || 'Pas de réponse.';

      appendMessage('ai', reply);
      history.push({ role: 'assistant', content: reply });

    } catch (err) {
      removeTyping();
      showToast('Erreur : ' + err.message);
      history.pop();
    } finally {
      setLoading(false);
      promptEl.focus();
    }
  }

  // Speech recognition
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'fr-FR';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onresult = (e) => {
      promptEl.value = e.results[0][0].transcript;
      promptEl.dispatchEvent(new Event('input'));
    };

    recognition.onend = () => {
      isRecording = false;
      micBtn.classList.remove('recording');
    };

    recognition.onerror = (e) => {
      isRecording = false;
      micBtn.classList.remove('recording');
      if (e.error !== 'no-speech') showToast('Micro : ' + e.error);
    };

    micBtn.addEventListener('click', () => {
      if (isRecording) {
        recognition.stop();
      } else {
        isRecording = true;
        micBtn.classList.add('recording');
        recognition.start();
      }
    });
  } else {
    micBtn.style.display = 'none';
  }

  // PWA install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
  });

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
